<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚒 レスキュー甲子園 ○×クイズ 🚑</title>
<style>
  :root {
    --rescue-red: #d63031;
    --rescue-red-dark: #b02525;
    --rescue-yellow: #fdcb1a;
    --rescue-cream: #fff8e7;
    --rescue-dark: #2d3436;
    --rescue-white: #ffffff;
    --maru-color: #e74c3c;
    --batsu-color: #2c3e50;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Yu Gothic", "メイリオ", sans-serif;
    background: var(--rescue-cream);
    color: var(--rescue-dark);
  }

  /* 背景パターン */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(214, 48, 49, 0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(253, 203, 26, 0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ストライプ装飾 */
  .stripe-top, .stripe-bottom {
    position: fixed;
    left: 0;
    right: 0;
    height: 12px;
    background: repeating-linear-gradient(
      45deg,
      var(--rescue-red),
      var(--rescue-red) 20px,
      var(--rescue-yellow) 20px,
      var(--rescue-yellow) 40px
    );
    z-index: 10;
  }
  .stripe-top { top: 0; }
  .stripe-bottom { bottom: 0; }

  /* 画面共通 */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    z-index: 1;
  }
  .screen.active {
    display: flex;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === タイトル画面 === */
  .title-emoji {
    font-size: 100px;
    margin-bottom: 20px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  .title-main {
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 900;
    color: var(--rescue-red);
    text-shadow: 4px 4px 0 var(--rescue-yellow), 6px 6px 0 var(--rescue-dark);
    letter-spacing: 4px;
    margin-bottom: 10px;
    text-align: center;
  }
  .title-sub {
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    color: var(--rescue-dark);
    background: var(--rescue-yellow);
    padding: 8px 30px;
    border-radius: 12px;
    margin-bottom: 40px;
    transform: rotate(-2deg);
    box-shadow: 4px 4px 0 var(--rescue-dark);
  }
  .title-hint {
    font-size: 22px;
    color: var(--rescue-dark);
    margin-top: 20px;
    padding: 16px 32px;
    background: white;
    border: 3px dashed var(--rescue-red);
    border-radius: 16px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  /* === 問題画面 === */
  .question-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
  }
  .question-number {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 900;
    color: var(--rescue-white);
    background: var(--rescue-red);
    padding: 12px 30px;
    border-radius: 16px;
    box-shadow: 4px 4px 0 var(--rescue-dark);
    transform: rotate(-2deg);
  }
  .question-level {
    font-size: 24px;
    font-weight: 700;
    color: var(--rescue-dark);
    background: var(--rescue-yellow);
    padding: 8px 20px;
    border-radius: 30px;
    border: 3px solid var(--rescue-dark);
  }

  .question-text {
    font-size: clamp(32px, 4.5vw, 56px);
    font-weight: 700;
    text-align: center;
    line-height: 1.6;
    max-width: 1100px;
    color: var(--rescue-dark);
    background: white;
    padding: 50px 60px;
    border-radius: 30px;
    border: 6px solid var(--rescue-red);
    box-shadow: 8px 8px 0 var(--rescue-dark);
    margin-bottom: 40px;
  }

  /* タイマー */
  .timer-container {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
  }
  .timer-label {
    font-size: 24px;
    font-weight: 700;
    color: var(--rescue-dark);
  }
  .timer-display {
    font-size: 64px;
    font-weight: 900;
    color: var(--rescue-red);
    width: 120px;
    text-align: center;
    font-family: "Courier New", monospace;
  }
  .timer-display.warning {
    animation: shake 0.3s ease-in-out infinite;
    color: #ff0000;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .timer-bar-container {
    width: 600px;
    max-width: 90vw;
    height: 20px;
    background: white;
    border: 4px solid var(--rescue-dark);
    border-radius: 30px;
    overflow: hidden;
    margin-top: 10px;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
    width: 100%;
    transition: width 0.1s linear;
  }

  /* === ドラムロール画面 === */
  .drumroll-text {
    font-size: clamp(60px, 10vw, 120px);
    font-weight: 900;
    color: var(--rescue-red);
    text-shadow: 4px 4px 0 var(--rescue-yellow);
    animation: drumshake 0.1s linear infinite;
  }
  @keyframes drumshake {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    25% { transform: translateX(-3px) rotate(-1deg); }
    75% { transform: translateX(3px) rotate(1deg); }
  }
  .drumroll-emoji {
    font-size: 120px;
    animation: spin 0.5s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* === 答え画面 === */
  .answer-mark {
    font-size: clamp(200px, 35vw, 400px);
    font-weight: 900;
    line-height: 1;
    animation: bigReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .answer-mark.maru {
    color: var(--maru-color);
    text-shadow: 8px 8px 0 var(--rescue-yellow), 12px 12px 0 var(--rescue-dark);
  }
  .answer-mark.batsu {
    color: var(--batsu-color);
    text-shadow: 8px 8px 0 var(--rescue-yellow), 12px 12px 0 var(--rescue-red);
  }
  @keyframes bigReveal {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(20deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .answer-label {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 900;
    color: var(--rescue-dark);
    background: var(--rescue-yellow);
    padding: 12px 50px;
    border-radius: 16px;
    margin-top: 20px;
    box-shadow: 6px 6px 0 var(--rescue-dark);
    transform: rotate(-2deg);
  }

  /* 紙吹雪 */
  .confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    pointer-events: none;
    z-index: 100;
  }

  /* === 解説画面 === */
  .explanation-container {
    max-width: 1100px;
    width: 90%;
  }
  .explanation-question {
    font-size: clamp(20px, 2.5vw, 28px);
    color: var(--rescue-dark);
    background: var(--rescue-cream);
    padding: 20px 30px;
    border-radius: 16px;
    border-left: 8px solid var(--rescue-red);
    margin-bottom: 30px;
    line-height: 1.5;
  }
  .explanation-answer-row {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-bottom: 30px;
    justify-content: center;
  }
  .explanation-mark {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
  }
  .explanation-mark.maru { color: var(--maru-color); }
  .explanation-mark.batsu { color: var(--batsu-color); }

  .explanation-text {
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    line-height: 1.7;
    color: var(--rescue-dark);
    background: white;
    padding: 40px 50px;
    border-radius: 24px;
    border: 5px solid var(--rescue-yellow);
    box-shadow: 6px 6px 0 var(--rescue-dark);
  }
  .explanation-text strong {
    color: var(--rescue-red);
    background: linear-gradient(transparent 60%, var(--rescue-yellow) 60%);
    padding: 0 4px;
  }

  /* === メトロノーム === */
  .metronome-area {
    margin-top: 30px;
    text-align: center;
    background: var(--rescue-cream);
    padding: 24px;
    border-radius: 20px;
    border: 4px dashed var(--rescue-red);
  }
  .metronome-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--rescue-dark);
    margin-bottom: 16px;
  }
  .metronome-btn {
    font-size: 28px;
    font-weight: 900;
    color: white;
    background: var(--rescue-red);
    border: none;
    padding: 18px 40px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--rescue-dark);
    transition: all 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .metronome-btn:hover {
    transform: translateY(-2px);
    box-shadow: 4px 6px 0 var(--rescue-dark);
  }
  .metronome-btn:active {
    transform: translateY(2px);
    box-shadow: 2px 2px 0 var(--rescue-dark);
  }
  .metronome-btn.playing {
    background: var(--rescue-dark);
  }
  .metronome-icon {
    font-size: 24px;
  }
  .metronome-pulse {
    margin: 20px auto 0;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--rescue-yellow);
    border: 5px solid var(--rescue-dark);
    opacity: 0.3;
    transition: transform 0.05s ease-out, opacity 0.05s ease-out;
  }
  .metronome-pulse.beat {
    transform: scale(1.3);
    opacity: 1;
    background: var(--rescue-red);
  }

  /* === 終了画面 === */
  .end-emoji {
    font-size: 120px;
    margin-bottom: 30px;
  }
  .end-title {
    font-size: clamp(56px, 9vw, 96px);
    font-weight: 900;
    color: var(--rescue-red);
    text-shadow: 4px 4px 0 var(--rescue-yellow), 6px 6px 0 var(--rescue-dark);
    margin-bottom: 30px;
    text-align: center;
  }
  .end-message {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 700;
    color: var(--rescue-dark);
    text-align: center;
    background: white;
    padding: 30px 50px;
    border-radius: 24px;
    border: 5px solid var(--rescue-red);
    box-shadow: 6px 6px 0 var(--rescue-dark);
    line-height: 1.6;
  }

  /* === ヘルプ（左下） === */
  .controls-help {
    position: fixed;
    bottom: 30px;
    left: 30px;
    background: rgba(255, 255, 255, 0.95);
    padding: 16px 20px;
    border-radius: 12px;
    border: 3px solid var(--rescue-dark);
    font-size: 14px;
    line-height: 1.6;
    z-index: 50;
    transition: opacity 0.3s;
    color: var(--rescue-dark);
    box-shadow: 4px 4px 0 var(--rescue-dark);
  }
  .controls-help kbd {
    background: var(--rescue-dark);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
    margin: 0 2px;
  }
  .controls-help.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* === 進行状況（右下） === */
  .progress {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--rescue-red);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 700;
    z-index: 50;
    box-shadow: 4px 4px 0 var(--rescue-dark);
  }

  /* タイマー稼働中の問題画面の境界線 */
  .question-text.active-timer {
    animation: borderPulse 1s ease-in-out infinite;
  }
  @keyframes borderPulse {
    0%, 100% { border-color: var(--rescue-red); }
    50% { border-color: var(--rescue-yellow); }
  }
</style>
</head>
<body>

<div class="stripe-top"></div>
<div class="stripe-bottom"></div>

<!-- タイトル画面 -->
<div class="screen active" id="screen-title">
  <div class="title-emoji">🚒</div>
  <h1 class="title-main">レスキュー甲子園</h1>
  <div class="title-sub" id="title-sub">○×クイズ</div>
  <div class="title-hint">スペースキー または クリックで スタート！</div>
</div>

<!-- 問題画面 -->
<div class="screen" id="screen-question">
  <div class="question-header">
    <div class="question-number" id="q-number">Q1</div>
  </div>
  <div class="question-text" id="q-text"></div>
  <div class="timer-container">
    <div class="timer-label">⏱️ シンキングタイム</div>
    <div class="timer-display" id="timer-display">10</div>
  </div>
  <div class="timer-bar-container">
    <div class="timer-bar" id="timer-bar"></div>
  </div>
</div>

<!-- ドラムロール画面 -->
<div class="screen" id="screen-drumroll">
  <div class="drumroll-emoji">🥁</div>
  <div class="drumroll-text">こたえは...</div>
</div>

<!-- 答え画面 -->
<div class="screen" id="screen-answer">
  <div class="answer-mark" id="answer-mark"></div>
  <div class="answer-label" id="answer-label"></div>
</div>

<!-- 解説画面 -->
<div class="screen" id="screen-explanation">
  <div class="explanation-container">
    <div class="explanation-question" id="exp-question"></div>
    <div class="explanation-answer-row">
      <div class="explanation-mark" id="exp-mark"></div>
      <div class="explanation-text" id="exp-text"></div>
    </div>
    <!-- メトロノーム（特定の問題でだけ表示） -->
    <div class="metronome-area" id="metronome-area" style="display:none;">
      <div class="metronome-title">▶ 実さいに リズムを 鳴らしてみよう！</div>
      <button class="metronome-btn" id="metronome-btn" onclick="toggleMetronome(event)">
        <span class="metronome-icon">▶</span>
        <span class="metronome-label">スタート（110回／分）</span>
      </button>
      <div class="metronome-pulse" id="metronome-pulse"></div>
    </div>
  </div>
</div>

<!-- 終了画面 -->
<div class="screen" id="screen-end">
  <div class="end-emoji">🎉🚒🎉</div>
  <h1 class="end-title">おつかれさま！</h1>
  <div class="end-message">
    今日おぼえたことを<br>
    いざという時に思い出してね！
  </div>
</div>

<!-- ヘルプ -->
<div class="controls-help" id="controls-help">
  <kbd>Space</kbd> or <kbd>→</kbd> 次へ進む（タイマー開始も）<br>
  <kbd>←</kbd> 1つ戻る / <kbd>R</kbd> 最初から<br>
  <kbd>Esc</kbd> 終了画面へ / <kbd>F</kbd> 全画面 / <kbd>H</kbd> ヘルプ
</div>

<!-- 進行状況 -->
<div class="progress" id="progress" style="display:none;">問題 0 / 15</div>

<script>
// ============================================
// クイズデータ
// ============================================
const quizzes = [
  {
    level: "かんたん",
    question: "火事を見つけたら、電話番号「119」にかける。",
    answer: true,
    explanation: "火事も救急車も<strong>119番</strong>。警察は110番ね。ちなみに119番に電話したら、最初に「火事ですか？救急ですか？」と聞かれるので、あわてず答えよう。"
  },

    explanation: "だいたい<strong>「アンパンマンのマーチ」のリズム</strong>くらい。"
  },
  {
    level: "ふつう",
    question: "道で倒れている人を見つけたら、まず肩を軽くたたきながら「だいじょうぶですか？」と呼びかける。",
    answer: true,
    explanation: "体をゆさぶるのはNG（首をいためるかも）。<strong>肩を軽くたたいて声をかける</strong>のが正解。"
  },
  {
    level: "ふつう",

    answer: false,
    explanation: "<strong>子どもにも使える！</strong> 小児用パッドがない場合は大人用でもOK。"
  },
  {

  {

    explanation: "自分が飛び込むと一緒におぼれちゃうので絶対ダメ。<strong>浮くものを投げて大人を呼ぶ！</strong>"

  {
    level: "へぇ〜",
    question: "心肺蘇生法の練習で使う人形には名前がついていて、その名前は「ハナコさん」である。",
    answer: false,
    explanation: "正しくは<strong>「レサシアン（Resusci Anne）」</strong>。1960年にノルウェーで作られた、世界で一番有名な練習用人形！ ちなみに、世界中の何億人もが人工呼吸の練習で口をつけてきたから<strong>「世界で一番キスされた顔」</strong>とも言われているんだって！"
  },
  {
    level: "へぇ〜",
    question: "「AED」という名前は、開発した人の名前からとったものである。",
    answer: false,
    explanation: "人の名前じゃなくて、英語の頭文字！ <strong>A</strong>utomated（自動）<strong>E</strong>xternal（体の外から）<strong>D</strong>efibrillator（電気ショックを与える機械）の略。"
  },
  {
    level: "へぇ〜",
    question: "救急車のサイレンの音「ピーポー」は、世界中どこでも同じ音である。",

  },
  {
    level: "へぇ〜",

    explanation: "実は消防車は専門のメーカーが作っていて、その<strong>半分以上は「モリタ」という1つの会社</strong>！しかも1台ずつオーダーメイドで、お値段はなんと…ポンプ車で約<strong>5000万円</strong>、レスキュー車で約<strong>1億円</strong>、はしご車にいたっては約<strong>2億円</strong>！"

  {

    question: "ハチに刺されたとき、傷口を流水で洗ってから病院に行くのがよい。",
    answer: true,

  {

// ============================================
// 状態管理
// ============================================
const TIMER_SECONDS = 10;
let currentQuestionIndex = 0;
let currentPhase = 'title'; // title -> question -> drumroll -> answer -> explanation -> next question / end
let timerInterval = null;
let timerStartTime = 0;
let drumrollTimeout = null;
let answerTimeout = null;
let isInputBlocked = false;

// ============================================
// 音 (Web Audio API)
// ============================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // suspended状態の場合は再開
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.3, delay = 0) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = 0;
  osc.connect(gain);
  gain.connect(ctx.destination);
  const startTime = ctx.currentTime + delay;
  osc.start(startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration);
}

function playPinpon() {
  // ピンポン♪
  playTone(880, 0.18, 'sine', 0.4);
  playTone(1318, 0.4, 'sine', 0.4, 0.18);
}

function playBuu() {
  // ブッブー
  playTone(196, 0.25, 'sawtooth', 0.3);
  playTone(196, 0.5, 'sawtooth', 0.3, 0.3);
}

function playTick() {
  playTone(800, 0.05, 'square', 0.1);
}

function playWarningTick() {
  playTone(1200, 0.08, 'square', 0.2);
}

function playTimeup() {
  playTone(300, 0.3, 'sawtooth', 0.3);
}

let drumrollNodes = null;
function startDrumroll() {
  stopDrumroll();
  const ctx = getAudioCtx();
  // ノイズベースのドラムロール
  const bufferSize = ctx.sampleRate * 0.05;
  const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    output[i] = Math.random() * 2 - 1;
  }

  const interval = setInterval(() => {
    const source = ctx.createBufferSource();
    source.buffer = noiseBuffer;
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    source.start();
    source.stop(ctx.currentTime + 0.05);
  }, 40);

  drumrollNodes = { interval };
}

function stopDrumroll() {
  if (drumrollNodes) {
    clearInterval(drumrollNodes.interval);
    drumrollNodes = null;
  }
}

function playFanfare() {
  // ジャジャーン！
  playTone(523, 0.15, 'square', 0.3, 0);    // C
  playTone(659, 0.15, 'square', 0.3, 0.15); // E
  playTone(784, 0.5, 'square', 0.3, 0.3);   // G
}

// ============================================
// メトロノーム（胸骨圧迫のリズム練習用）
// 110 BPM = 60000/110 ≒ 545ms 間隔
// ============================================
let metronomeInterval = null;
const METRONOME_BPM = 110;

function playClick() {
  // 高めの「ピッ」音
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.value = 1000;
  gain.gain.value = 0;
  osc.connect(gain);
  gain.connect(ctx.destination);
  const t = ctx.currentTime;
  osc.start(t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.25, t + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.stop(t + 0.08);
}

function toggleMetronome(event) {
  if (event) event.stopPropagation(); // 画面クリックで進行しちゃうのを防ぐ
  const btn = document.getElementById('metronome-btn');
  const pulse = document.getElementById('metronome-pulse');
  const labelEl = btn.querySelector('.metronome-label');
  const iconEl = btn.querySelector('.metronome-icon');

  if (metronomeInterval) {
    // 停止
    clearInterval(metronomeInterval);
    metronomeInterval = null;
    btn.classList.remove('playing');
    labelEl.textContent = 'スタート（110回／分）';
    iconEl.textContent = '▶';
    pulse.classList.remove('beat');
  } else {
    // 開始
    getAudioCtx();
    const intervalMs = 60000 / METRONOME_BPM;
    btn.classList.add('playing');
    labelEl.textContent = 'ストップ';
    iconEl.textContent = '■';

    // 即座に1拍目
    const beat = () => {
      playClick();
      pulse.classList.add('beat');
      setTimeout(() => pulse.classList.remove('beat'), 100);
    };
    beat();
    metronomeInterval = setInterval(beat, intervalMs);
  }
}

function stopMetronome() {
  // 画面遷移時の自動停止
  if (metronomeInterval) {
    const btn = document.getElementById('metronome-btn');
    const pulse = document.getElementById('metronome-pulse');
    const labelEl = btn.querySelector('.metronome-label');
    const iconEl = btn.querySelector('.metronome-icon');
    clearInterval(metronomeInterval);
    metronomeInterval = null;
    btn.classList.remove('playing');
    labelEl.textContent = 'スタート（110回／分）';
    iconEl.textContent = '▶';
    pulse.classList.remove('beat');
  }
}

// ============================================
// 画面切替
// ============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================
// 進行状況更新
// ============================================
function updateProgress() {
  const progress = document.getElementById('progress');
  if (currentPhase === 'title' || currentPhase === 'end') {
    progress.style.display = 'none';
  } else {
    progress.style.display = 'block';
    progress.textContent = `問題 ${currentQuestionIndex + 1}`;
  }
}

// ============================================
// タイマー
// ============================================
function startTimer() {
  stopTimer();
  timerStartTime = Date.now();
  const display = document.getElementById('timer-display');
  const bar = document.getElementById('timer-bar');
  const qText = document.getElementById('q-text');
  qText.classList.add('active-timer');

  display.textContent = TIMER_SECONDS;
  display.classList.remove('warning');
  bar.style.width = '100%';

  let lastSecond = TIMER_SECONDS;

  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - timerStartTime) / 1000;
    const remaining = Math.max(0, TIMER_SECONDS - elapsed);
    const remainingSecond = Math.ceil(remaining);

    display.textContent = remainingSecond;
    bar.style.width = (remaining / TIMER_SECONDS * 100) + '%';

    // 残り3秒で警告
    if (remaining <= 3) {
      display.classList.add('warning');
    }

    // 秒が変わった時に音を鳴らす
    if (remainingSecond < lastSecond && remainingSecond > 0) {
      if (remainingSecond <= 3) {
        playWarningTick();
      } else {
        playTick();
      }
      lastSecond = remainingSecond;
    }

    if (remaining <= 0) {
      stopTimer();
      display.textContent = 0;
      playTimeup();
      qText.classList.remove('active-timer');
    }
  }, 50);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  const qText = document.getElementById('q-text');
  if (qText) qText.classList.remove('active-timer');
}

// ============================================
// 紙吹雪
// ============================================
function launchConfetti() {
  const colors = ['#d63031', '#fdcb1a', '#2d3436', '#ffffff', '#e74c3c'];
  for (let i = 0; i < 60; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.top = '-20px';
    const rotation = Math.random() * 360;
    conf.style.transform = `rotate(${rotation}deg)`;
    document.body.appendChild(conf);

    const duration = 2000 + Math.random() * 2000;
    const drift = (Math.random() - 0.5) * 200;
    conf.animate([
      { transform: `translate(0, 0) rotate(${rotation}deg)`, opacity: 1 },
      { transform: `translate(${drift}px, 100vh) rotate(${rotation + 720}deg)`, opacity: 0.7 }
    ], {
      duration: duration,
      easing: 'cubic-bezier(0.1, 0.3, 0.6, 1)'
    });

    setTimeout(() => conf.remove(), duration);
  }
}

// ============================================
// フェーズ管理
// ============================================
function showQuestion() {
  const q = quizzes[currentQuestionIndex];
  document.getElementById('q-number').textContent = `Q${currentQuestionIndex + 1}`;
  document.getElementById('q-text').textContent = q.question;

  // タイマー表示を初期状態に（待機中）
  const display = document.getElementById('timer-display');
  const bar = document.getElementById('timer-bar');
  display.textContent = TIMER_SECONDS;
  display.classList.remove('warning');
  bar.style.width = '100%';

  // タイマーラベルを「スタート待ち」状態にする
  document.querySelector('.timer-label').innerHTML = '⏱️ シンキングタイム <span style="font-size:18px; color:#d63031;">（スペースキーでスタート）</span>';

  showScreen('screen-question');
  currentPhase = 'question'; // タイマー開始前
  updateProgress();
}

function startThinkingTime() {
  // ラベルを通常に戻す
  document.querySelector('.timer-label').innerHTML = '⏱️ シンキングタイム';
  currentPhase = 'thinking';
  startTimer();
}

function showDrumroll() {
  stopTimer();
  showScreen('screen-drumroll');
  currentPhase = 'drumroll';
  startDrumroll();
  // 1.5秒後に自動で答えへ
  drumrollTimeout = setTimeout(() => {
    showAnswer();
  }, 1500);
}

function showAnswer() {
  stopDrumroll();
  clearTimeout(drumrollTimeout);
  const q = quizzes[currentQuestionIndex];
  const mark = document.getElementById('answer-mark');
  const label = document.getElementById('answer-label');

  if (q.answer) {
    mark.textContent = '○';
    mark.className = 'answer-mark maru';
    label.textContent = 'せいかい！';
    playFanfare();
    launchConfetti();
  } else {
    mark.textContent = '✕';
    mark.className = 'answer-mark batsu';
    label.textContent = 'バツ！';
    playBuu();
  }

  showScreen('screen-answer');
  currentPhase = 'answer';
}

function showExplanation() {
  const q = quizzes[currentQuestionIndex];
  document.getElementById('exp-question').textContent = `Q${currentQuestionIndex + 1}. ${q.question}`;
  const expMark = document.getElementById('exp-mark');
  expMark.textContent = q.answer ? '○' : '✕';
  expMark.className = q.answer ? 'explanation-mark maru' : 'explanation-mark batsu';
  document.getElementById('exp-text').innerHTML = q.explanation;

  // Q4（心臓マッサージのリズム問題、インデックス3）の時だけメトロノームを表示
  const metronomeArea = document.getElementById('metronome-area');
  if (currentQuestionIndex === 3) {
    metronomeArea.style.display = 'block';
  } else {
    metronomeArea.style.display = 'none';
  }

  showScreen('screen-explanation');
  currentPhase = 'explanation';
}

function nextQuestion() {
  if (currentQuestionIndex < quizzes.length - 1) {
    currentQuestionIndex++;
    showQuestion();
  } else {
    showEnd();
  }
}

function showEnd() {
  showScreen('screen-end');
  currentPhase = 'end';
  updateProgress();
  launchConfetti();
  setTimeout(() => launchConfetti(), 600);
  setTimeout(() => launchConfetti(), 1200);
  playFanfare();
}

function showTitle() {
  currentQuestionIndex = 0;
  showScreen('screen-title');
  currentPhase = 'title';
  updateProgress();
}

// ============================================
// 進行（前へ進む）
// ============================================
function advance() {
  if (isInputBlocked) return;
  isInputBlocked = true;
  setTimeout(() => isInputBlocked = false, 200);

  // 解説画面から離れる時はメトロノームを止める
  if (currentPhase === 'explanation') stopMetronome();

  switch (currentPhase) {
    case 'title':
      currentQuestionIndex = 0;
      showQuestion();
      break;
    case 'question':
      // タイマー開始前 → タイマースタート
      startThinkingTime();
      break;
    case 'thinking':
      // タイマー稼働中 → ドラムロールへ
      showDrumroll();
      break;
    case 'drumroll':
      showAnswer();
      break;
    case 'answer':
      showExplanation();
      break;
    case 'explanation':
      nextQuestion();
      break;
    case 'end':
      showTitle();
      break;
  }
}

// ============================================
// 戻る
// ============================================
function goBack() {
  stopTimer();
  stopDrumroll();
  stopMetronome();
  clearTimeout(drumrollTimeout);

  switch (currentPhase) {
    case 'question':
    case 'thinking':
      if (currentQuestionIndex === 0) {
        showTitle();
      } else {
        // 前の問題の解説に戻る
        currentQuestionIndex--;
        showExplanation();
      }
      break;
    case 'drumroll':
    case 'answer':
      showQuestion();
      break;
    case 'explanation':
      showAnswer();
      break;
    case 'end':
      currentQuestionIndex = quizzes.length - 1;
      showExplanation();
      break;
  }
}

// ============================================
// 全画面
// ============================================
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// ============================================
// ヘルプ表示切替
// ============================================
function toggleHelp() {
  document.getElementById('controls-help').classList.toggle('hidden');
}

// ============================================
// 入力ハンドラ
// ============================================
document.addEventListener('keydown', (e) => {
  // 音声コンテキスト初期化（ユーザー操作必須）
  getAudioCtx();

  switch (e.key) {
    case ' ':
    case 'ArrowRight':
    case 'Enter':
      e.preventDefault();
      advance();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      goBack();
      break;
    case 'Escape':
      e.preventDefault();
      // 終了画面にジャンプ（時間切れ用）
      if (currentPhase !== 'end' && currentPhase !== 'title') {
        if (confirm('終了画面に飛びますか？')) {
          stopTimer();
          stopDrumroll();
          stopMetronome();
          clearTimeout(drumrollTimeout);
          showEnd();
        }
      }
      break;
    case 'f':
    case 'F':
      e.preventDefault();
      toggleFullscreen();
      break;
    case 'h':
    case 'H':
      e.preventDefault();
      toggleHelp();
      break;
    case 'r':
    case 'R':
      e.preventDefault();
      if (confirm('最初からやり直しますか？')) {
        stopTimer();
        stopDrumroll();
        stopMetronome();
        showTitle();
      }
      break;
  }
});

document.addEventListener('click', (e) => {
  // ヘルプ・進行状況・メトロノームエリアのクリックは無視
  if (e.target.closest('.controls-help') || e.target.closest('.progress') || e.target.closest('.metronome-area')) return;
  getAudioCtx();
  advance();
});

// 初期化
updateProgress();
</script>
